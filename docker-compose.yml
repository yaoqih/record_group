services:
  recordflow-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      RECORDFLOW_DB_PATH: /app/var/recordflow.db
      RECORDFLOW_LLM_BASE_URL: ${RECORDFLOW_LLM_BASE_URL:-https://yunwu.ai/v1}
      RECORDFLOW_LLM_MODEL: ${RECORDFLOW_LLM_MODEL:-deepseek-v4-flash}
      RECORDFLOW_LLM_API_KEY: ${RECORDFLOW_LLM_API_KEY:-}
      RECORDFLOW_APP_API_KEY: ${RECORDFLOW_APP_API_KEY:-}
      RECORDFLOW_B2_KEY_ID: ${RECORDFLOW_B2_KEY_ID:-}
      RECORDFLOW_B2_APPLICATION_KEY: ${RECORDFLOW_B2_APPLICATION_KEY:-}
      RECORDFLOW_B2_BUCKET_NAME: ${RECORDFLOW_B2_BUCKET_NAME:-}
      RECORDFLOW_B2_BUCKET_ID: ${RECORDFLOW_B2_BUCKET_ID:-}
      RECORDFLOW_B2_PUBLIC_BASE_URL: ${RECORDFLOW_B2_PUBLIC_BASE_URL:-}
      RECORDFLOW_B2_CDN_BASE_URL: ${RECORDFLOW_B2_CDN_BASE_URL:-}
      RECORDFLOW_STEPFUN_API_KEY: ${RECORDFLOW_STEPFUN_API_KEY:-}
      RECORDFLOW_STEPFUN_BASE_URL: ${RECORDFLOW_STEPFUN_BASE_URL:-https://api.stepfun.com}
      RECORDFLOW_STEPFUN_ASR_MODEL: ${RECORDFLOW_STEPFUN_ASR_MODEL:-stepaudio-2.5-asr}
      RECORDFLOW_STEPFUN_ASR_LANGUAGE: ${RECORDFLOW_STEPFUN_ASR_LANGUAGE:-zh}
      RECORDFLOW_STEPFUN_ENABLE_ITN: ${RECORDFLOW_STEPFUN_ENABLE_ITN:-true}
      RECORDFLOW_STEPFUN_TIMEOUT_SECONDS: ${RECORDFLOW_STEPFUN_TIMEOUT_SECONDS:-300}
    volumes:
      - recordflow-data:/app/var

  recordflow-compress-worker:
    build: .
    command: ["python", "-m", "recordflow_agent.worker", "--types", "compress_media"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      RECORDFLOW_DB_PATH: /app/var/recordflow.db
      RECORDFLOW_LLM_BASE_URL: ${RECORDFLOW_LLM_BASE_URL:-https://yunwu.ai/v1}
      RECORDFLOW_LLM_MODEL: ${RECORDFLOW_LLM_MODEL:-deepseek-v4-flash}
      RECORDFLOW_LLM_API_KEY: ${RECORDFLOW_LLM_API_KEY:-}
      RECORDFLOW_B2_KEY_ID: ${RECORDFLOW_B2_KEY_ID:-}
      RECORDFLOW_B2_APPLICATION_KEY: ${RECORDFLOW_B2_APPLICATION_KEY:-}
      RECORDFLOW_B2_BUCKET_NAME: ${RECORDFLOW_B2_BUCKET_NAME:-}
      RECORDFLOW_B2_BUCKET_ID: ${RECORDFLOW_B2_BUCKET_ID:-}
      RECORDFLOW_B2_PUBLIC_BASE_URL: ${RECORDFLOW_B2_PUBLIC_BASE_URL:-}
      RECORDFLOW_B2_CDN_BASE_URL: ${RECORDFLOW_B2_CDN_BASE_URL:-}
    volumes:
      - recordflow-data:/app/var

  recordflow-asr-worker:
    build: .
    command: ["python", "-m", "recordflow_agent.worker", "--types", "transcribe_media,process_record"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      RECORDFLOW_DB_PATH: /app/var/recordflow.db
      RECORDFLOW_LLM_BASE_URL: ${RECORDFLOW_LLM_BASE_URL:-https://yunwu.ai/v1}
      RECORDFLOW_LLM_MODEL: ${RECORDFLOW_LLM_MODEL:-deepseek-v4-flash}
      RECORDFLOW_LLM_API_KEY: ${RECORDFLOW_LLM_API_KEY:-}
      RECORDFLOW_B2_KEY_ID: ${RECORDFLOW_B2_KEY_ID:-}
      RECORDFLOW_B2_APPLICATION_KEY: ${RECORDFLOW_B2_APPLICATION_KEY:-}
      RECORDFLOW_B2_BUCKET_NAME: ${RECORDFLOW_B2_BUCKET_NAME:-}
      RECORDFLOW_B2_BUCKET_ID: ${RECORDFLOW_B2_BUCKET_ID:-}
      RECORDFLOW_B2_PUBLIC_BASE_URL: ${RECORDFLOW_B2_PUBLIC_BASE_URL:-}
      RECORDFLOW_B2_CDN_BASE_URL: ${RECORDFLOW_B2_CDN_BASE_URL:-}
      RECORDFLOW_STEPFUN_API_KEY: ${RECORDFLOW_STEPFUN_API_KEY:-}
      RECORDFLOW_STEPFUN_BASE_URL: ${RECORDFLOW_STEPFUN_BASE_URL:-https://api.stepfun.com}
      RECORDFLOW_STEPFUN_ASR_MODEL: ${RECORDFLOW_STEPFUN_ASR_MODEL:-stepaudio-2.5-asr}
      RECORDFLOW_STEPFUN_ASR_LANGUAGE: ${RECORDFLOW_STEPFUN_ASR_LANGUAGE:-zh}
      RECORDFLOW_STEPFUN_ENABLE_ITN: ${RECORDFLOW_STEPFUN_ENABLE_ITN:-true}
      RECORDFLOW_STEPFUN_TIMEOUT_SECONDS: ${RECORDFLOW_STEPFUN_TIMEOUT_SECONDS:-300}
    volumes:
      - recordflow-data:/app/var

volumes:
  recordflow-data:
